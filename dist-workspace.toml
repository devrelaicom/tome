[workspace]
members = ["cargo:."]

# cargo-dist configuration (FR-018/019/020, research §R-13/14/15).
#
# This drives `dist build` (archives + checksums + the shell installer + the
# Homebrew formula) and `dist plan` (the build manifest). It is the source of
# truth for WHAT artifacts a tagged release produces.
#
# IMPORTANT — the CI workflow is hand-authored (`.github/workflows/release.yml`),
# NOT generated by `dist generate`. cargo-dist's generated workflow cannot
# express the project's required gates (fmt/clippy/cargo-deny, `actions/checkout`
# pinned to the CI baseline @v5, the per-target sidecar `ldd`/`otool` check, the
# 50 MB size assertion) and would re-introduce a `pull_request` trigger we must
# not have (the release pipeline is tag-triggered + dormant). So `release.yml`
# calls `dist build` itself and wraps it in those gates. Do NOT run
# `dist generate` / `dist init` without re-reconciling release.yml afterwards
# (it would overwrite the hand-authored gated workflow).
[dist]
# Pin the cargo-dist version used everywhere (the workflow installs this exact
# version). NFR-008 / reproducibility.
cargo-dist-version = "0.32.0"

# CI backend (GitHub Actions). We do not auto-generate the workflow (see note
# above), but cargo-dist still needs this to compute the build matrix / hosting.
ci = "github"

# We maintain `.github/workflows/release.yml` by hand (the gated, tag-only,
# dormant-publish workflow described above). `allow-dirty = ["ci"]` tells
# cargo-dist NOT to check or regenerate that file, so `dist plan` / `dist build`
# stop trying to overwrite the hand-authored workflow. This is cargo-dist's
# documented escape hatch for a custom CI workflow.
allow-dirty = ["ci"]

# Self-contained prebuilt binaries for Linux (x86_64 + aarch64) and
# Apple-silicon macOS (FR-018). Windows is explicitly out of scope this phase
# (research §R-24). Intel macOS (x86_64-apple-darwin) was dropped: the
# macos-13 runner pool stalls release builds and the target is not supported.
# NOTE: any target added here MUST also be added to the `[dist.binaries]` map at
# the bottom of this file, or its archive will revert to packing the CI-only
# `refresh_model_registry` bin and break the release.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

# A POSIX shell installer (curl | sh) plus a Homebrew formula/installer
# (FR-019). The crates.io publish is wired as a dormant, secret-gated job in
# release.yml rather than via cargo-dist's publish-jobs, so it stays inert
# until the operator sets CARGO_REGISTRY_TOKEN (user-reserved action).
installers = ["shell", "homebrew"]

# Push the generated formula to the cross-owner tap (FR-019, research §R-14).
# The push uses an operator-provided least-privilege PAT (HOMEBREW_TAP_TOKEN),
# wired in release.yml and never logged (NFR-010 / §XIII). Until that secret
# exists the formula is still generated + attached to the release, but the tap
# push step is skipped (dormant).
tap = "aaronbassett/homebrew-tap"
formula = "tome"

# Where releases are hosted.
hosting = "github"

# Build each target in separate, precise invocations rather than one
# fat host build — required for cross-target correctness and so each target's
# self-contained check runs against its own binary (FR-018, SC-007).
precise-builds = true

# Pass `--locked` through to the underlying cargo build so a tagged artifact
# matches the committed, audited Cargo.lock exactly — no transitive bump
# silently enters a release (NFR-008).
cargo-build-args = ["--locked"]

# The Linux build targets an older glibc baseline (Ubuntu 22.04 ships glibc
# 2.35) so the binary runs across mainstream distributions (FR-018 Edge Case).
# ONNX Runtime (via `ort`'s download-binaries), llama.cpp (via llama-cpp-2),
# and the vendored sqlite-vec are all statically linked, so the only dynamic
# deps are the platform's own libc/libstdc++/libgcc — acceptable for
# "self-contained" (no application-specific inference sidecar). The per-target
# `ldd`/`otool` check in release.yml asserts no `libonnxruntime` appears.
[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-22.04"
aarch64-unknown-linux-gnu = "ubuntu-22.04-arm"

# Ship ONLY the `tome` binary in release archives (per-platform allowlist).
#
# The crate declares a second `[[bin]]`, `refresh_model_registry`, gated behind
# `required-features = ["registry-refresh"]` (Cargo.toml). It is a CI-only helper
# run by `model-registry-refresh.yml` and must NEVER be in a user release. The
# author's assumption that `required-features` would keep it out of cargo-dist
# was wrong: cargo-dist enumerates ALL `[[bin]]` targets from `cargo metadata`
# and ignores `required-features`, so `dist plan` packed `refresh_model_registry`
# into every archive and `dist build` (which never enables `registry-refresh`)
# failed with `× failed to find bin refresh_model_registry` — this broke the
# v0.7.8 and v0.7.9 releases (the bin was added in #267, after v0.7.7).
#
# `[dist.binaries]` overrides the binary list per target triple, restricting each
# archive/installer to `tome` only. This matches historical behaviour (releases
# through v0.7.7 shipped just `tome`). The map MUST be kept in sync with the
# `targets` array above: any new target added there must also be listed here, or
# its archive reverts to including both bins and the release breaks again.
[dist.binaries]
"aarch64-apple-darwin" = ["tome"]
"aarch64-unknown-linux-gnu" = ["tome"]
"x86_64-unknown-linux-gnu" = ["tome"]
