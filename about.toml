# cargo-about configuration for the THIRD-PARTY-LICENSES bundle (FR-019 /
# research §R-15). `cargo about generate --all-features about.hbs` enumerates
# the licences of every crate in the dependency graph and renders them into a
# plain-text notice file; the native-component notices (ONNX Runtime,
# llama.cpp, vendored sqlite-vec — linked outside the cargo graph) are appended
# separately and kept under version control in THIRD-PARTY-LICENSES.
#
# The `accepted` list mirrors deny.toml's licence allowlist + per-crate
# exceptions so the two stay consistent and cargo-deny remains green (NFR-007).
# (`--all-features` and `--workspace` are passed on the CLI, not as config keys
# — cargo-about treats unknown top-level keys as per-crate tables.)

# Build the licence list across all target platforms we ship (FR-018), so a
# platform-specific transitive (e.g. a Linux-only or macOS-only crate) still
# has its notice carried. Overridable with `--target` on the CLI.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

# Our own workspace crate carries no third-party notice; dev-deps never ship in
# the binary, so they are excluded from the bundle.
ignore-dev-dependencies = true

# SPDX licences accepted in the bundle — identical set to deny.toml's `allow`
# plus the per-crate exceptions (cargo-about has no per-crate accept, so the
# exceptions are accepted globally here; deny.toml remains the narrow gate).
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0", # webpki-roots (Mozilla CA bundle)
    "MPL-2.0",             # option-ext (file-level weak copyleft)
    "NCSA",                # libfuzzer-sys (LLVM-derived, permissive)
]
