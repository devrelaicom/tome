name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Belt-and-suspenders: CI is already auto-detected as telemetry-off, but pin
  # the explicit force-off so no test-spawned `tome` can ever emit or fork a
  # detached flusher on a runner, independent of CI-var detection (#225).
  TOME_TELEMETRY: "0"
  # The ~175 integration-test binaries each statically embed ONNX Runtime +
  # llama.cpp + SQLite; with full debuginfo they grew large enough that
  # `cargo build --all-targets` exhausted the runner disk and the linker died
  # with SIGBUS (collect2: ld terminated with signal 7). line-tables-only keeps
  # file:line backtraces while cutting most of the per-binary debuginfo.
  CARGO_PROFILE_DEV_DEBUG: "line-tables-only"

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, msrv]
    steps:
      - uses: actions/checkout@v5

      # ubuntu/stable also runs a release build for the size check, so the
      # heavy C/C++ deps (ort, llama-cpp-2, sqlite-vec, bundled SQLite) compile
      # into two profiles AND link into ~175 test binaries — exhausting the
      # runner's free root disk (first "No space left", then a linker SIGBUS).
      # Reclaim every large preinstalled SDK we never use so linking has room.
      - name: Free disk space (Linux runners)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache /usr/local/share/boost \
            /usr/local/share/powershell /usr/share/swift
          sudo docker image prune --all --force || true
          df -h /

      - name: Read MSRV from Cargo.toml
        id: msrv
        shell: bash
        run: |
          version=$(grep '^rust-version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Defeat the repo-local `rust-toolchain.toml` (which pins channel =
      # "stable" for local dev). In CI, the matrix is the source of truth
      # for which toolchain to test against; leaving the file in place
      # silently routes the MSRV job through stable AND races with the
      # rustup proxy on the first `cargo fmt` call (signature: "error:
      # unexpected argument 'fmt' found"). Removing it in CI defangs both.
      - name: Defeat rust-toolchain.toml in CI
        shell: bash
        run: rm -f rust-toolchain.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain == 'msrv' && steps.msrv.outputs.version || 'stable' }}
          components: rustfmt, clippy

      # Sanity-check materialisation of the toolchain. Forces rustup to
      # fully resolve the proxy for the matrix toolchain before any cargo
      # subcommand runs, eliminating the race that produced the "unexpected
      # argument 'fmt' found" flake on macOS runners.
      - name: Confirm active toolchain
        shell: bash
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-${{ matrix.toolchain }}
          # Do NOT cache `~/.cargo/bin`. The action's default (`cache-bin:
          # true`) restores the cargo binary from cache, which on macOS
          # MSRV ends up pointing back at the rustup proxy and undoes the
          # dtolnay toolchain install — `cargo fmt` then fails with the
          # signature "error: unexpected argument 'fmt' found". The cargo
          # binary itself is cheap to provision; the registry + target
          # cache are what's expensive, and those are still cached.
          cache-bin: false

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --all-targets --all-features

      - name: cargo test
        run: cargo test --workspace

      - name: Release binary size check (< 50 MB stripped)
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        shell: bash
        run: |
          cargo build --release --locked
          size=$(stat -c%s target/release/tome)
          limit=52428800
          mb=$(python3 -c "print(f'{$size / 1048576:.2f}')")
          echo "release binary: ${mb} MB ($size bytes, limit ${limit})"
          if [ "$size" -ge "$limit" ]; then
            echo "::error::Release binary ${mb} MB exceeds the 50 MB limit (NFR-001)"
            exit 1
          fi
