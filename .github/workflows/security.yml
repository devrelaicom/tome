name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly on Mondays at 04:17 UTC. Drift the minute to avoid the
    # top-of-the-hour stampede on GitHub-hosted runners.
    - cron: "17 4 * * 1"

env:
  CARGO_TERM_COLOR: always
  # Force telemetry off on the runner (defence-in-depth beyond CI auto-off, #225).
  TOME_TELEMETRY: "0"

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: security-audit

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: cargo audit
        run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: security-deny

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo deny check
        run: cargo deny check
