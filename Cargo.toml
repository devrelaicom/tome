[package]
name = "tome"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "MIT OR Apache-2.0"
description = "Cross-harness plugin catalog manager for AI coding assistants."
repository = "https://github.com/devrelaicom/tome"
readme = "README.md"
categories = ["command-line-utilities", "development-tools"]
keywords = ["claude-code", "plugins", "ai", "cli"]

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
serde_json = "1"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
sha2 = "0.10"
hex = "0.4"
tempfile = "3"
ctrlc = "3"
regex = "1"
semver = "1"
time = { version = "0.3", features = ["serde-human-readable", "formatting", "parsing"] }

[profile.release]
strip = "symbols"
lto = "thin"
codegen-units = 1
