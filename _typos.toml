[default]
# Crate names and identifiers that look like typos but are correct upstream names.
extend-ignore-identifiers-re = [
    "flate2",
    # 7..40-char lowercase hex strings — git SHAs cited in commits / docs.
    # The typos checker otherwise flags substrings like `ba`, `dca`, `fab`
    # inside SHAs as misspellings of `by` / `the` / `feb`.
    "[0-9a-f]{7,40}",
]

[default.extend-words]
# "mis" appears as a prefix in hyphenated words like "mis-detected" in design docs.
mis = "mis"
# Phase 2 vocabulary and crate names that the typos lint mis-flags.
flate2 = "flate2"
INSER = "INSER"
INSERTs = "INSERTs"
# "undet" = deliberate "undetected" abbreviation in harness selection test
# fixture names (Phase 11); newer typos-cli flags it as "under".
undet = "undet"

[files]
extend-exclude = [
    "CHANGELOG.md",
    "target/",
    "specs/**/contracts/*.toml",
    "vendor/",
    # Generated licence aggregate (FR-019): verbatim third-party licence text +
    # crate names (e.g. pdf-rs's "contributers", the `writeable` crate) that the
    # typos lint mis-flags and which MUST stay byte-accurate. Same rationale as
    # excluding vendor/.
    "THIRD-PARTY-LICENSES",
    # Vendored site/ subtree (Task 1): synced from tome-site upstream; upstream
    # content must not be edited in place to fix typos — address in tome-site
    # and re-vendor. "unparseable" in docs/authoring/lint.md is upstream usage.
    "site/",
]
