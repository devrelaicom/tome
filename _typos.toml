[default]
# Crate names and identifiers that look like typos but are correct upstream names.
extend-ignore-identifiers-re = [
    "flate2",
    # 7..40-char lowercase hex strings — git SHAs cited in commits / docs.
    # The typos checker otherwise flags substrings like `ba`, `dca`, `fab`
    # inside SHAs as misspellings of `by` / `the` / `feb`.
    "[0-9a-f]{7,40}",
]

[default.extend-words]
# "mis" appears as a prefix in hyphenated words like "mis-detected" in design docs.
mis = "mis"
# Phase 2 vocabulary and crate names that the typos lint mis-flags.
flate2 = "flate2"
INSER = "INSER"
INSERTs = "INSERTs"

[files]
extend-exclude = [
    "CHANGELOG.md",
    "target/",
    "specs/**/contracts/*.toml",
    "vendor/",
]
