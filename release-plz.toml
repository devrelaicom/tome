# release-plz configuration.
#
# release-plz is the AUTOMATIC RELEASE FRONT-END: on every push to `main` it
# maintains a "Release vX.Y.Z" PR (version bump in Cargo.toml/Cargo.lock +
# CHANGELOG section regenerated from the Conventional Commits). Merging that PR
# is the single approval gate; release-plz then pushes the `vX.Y.Z` git tag.
#
# The tag fires the existing, audited `.github/workflows/release.yml` (the
# BACK-END), which builds the 4 prebuilt-binary targets, attaches the shell +
# Homebrew installers + the licence bundle, creates the GitHub Release,
# publishes to crates.io, and pushes the Homebrew formula.
#
# DIVISION OF LABOUR — release-plz tags ONLY; release.yml builds/publishes/
# releases. This keeps `cargo publish` GATED BEHIND A GREEN 4-target build
# (release.yml runs publish last), so a failed binary build can never leave a
# published-but-binary-less version. Hence the toggles below.
#
# LOOP AVOIDANCE (git_only) — because release-plz does NOT publish (`publish =
# false`; the crate reaches crates.io only later, via release.yml's gated job),
# the cargo registry LAGS the actual release by the full ~18-min binary build.
# release-plz's DEFAULT "what's already released?" source of truth is the
# registry, so for those ~18 min it believes the just-merged version is still
# unreleased and re-opens a DUPLICATE "Release vX.Y.Z" PR. `git_only = true`
# switches that source of truth to GIT TAGS: the instant release-plz pushes the
# `vX.Y.Z` tag, the version counts as released — no registry round-trip, no
# window, no duplicate PR. (Pairs with the job sequencing in release-plz.yml,
# which guarantees the tag lands before the PR job re-evaluates.) Requires
# release-plz CLI >= 0.3.159 (release-plz/action >= v0.5.130).

[workspace]
# Source of truth for "what's released" = git tags, NOT the cargo registry.
# Mandatory here because publishing is deferred to release.yml (see header):
# without it, the lagging registry triggers a duplicate-Release-PR loop.
# NOTE: release-plz forbids `git_only` and `publish` both being `true`; we keep
# `publish = false` below, so this is the one valid git-only configuration.
git_only = true

# Create + push the git tag (this is what triggers release.yml).
git_tag_enable = true

# Tag as `vX.Y.Z` to match release.yml's trigger `v[0-9]+.[0-9]+.[0-9]+*`.
# For a single-crate repo this is already release-plz's default, but it's pinned
# explicitly so the tag stays `vX.Y.Z` (and keeps firing release.yml) even if
# the repo ever grows a Cargo `[workspace]` — at which point the default would
# switch to the package-prefixed `tome-mcp-v{{ version }}`, which would NOT
# match the trigger.
git_tag_name = "v{{ version }}"

# release.yml's `release` job creates the GitHub Release (with the binary
# artifacts attached). Don't let release-plz create a second one.
git_release_enable = false

# release.yml's gated `publish-crates-io` job runs `cargo publish` LAST, after
# a green build. Don't let release-plz publish (it would publish before the
# binaries are built). With `git_only = true` above, release-plz determines the
# last released version from git tags (not the registry), so it needs no
# crates.io token and never depends on the lagging registry.
publish = false

# Changelog generation (git-cliff). Conventional-Commit types map to readable,
# grouped sections; pure-noise types (ci/build/test/style/chore + merge
# commits) are skipped so the changelog reads as a user-facing release note,
# not a raw commit log. The trailing catch-all routes any non-conventional
# (pre-cog-enforcement) commit into "Other" so git-cliff never invents a group
# from the subject line.
[changelog]
protect_breaking_commits = true
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { message = "^revert", group = "Reverted" },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^(chore|ci|build|test|style)", skip = true },
    { message = "^Merge", skip = true },
    { message = ".*", group = "Other" },
]



